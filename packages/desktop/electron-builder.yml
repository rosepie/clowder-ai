appId: com.catcafe.desktop
productName: Cat Cafe
copyright: Copyright © 2026 Cat Cafe Team

directories:
  output: release
  buildResources: resources

# Electron app files (main process + preload + setup page)
files:
  - dist/**/*
  - resources/**/*

# The app-bundle is created by scripts/prepare-bundle.sh using `pnpm deploy`
# which resolves all pnpm symlinks into flat, self-contained directories
# with native modules compiled for the CURRENT platform.
#
# IMPORTANT: You must build on the TARGET platform.
#   macOS → .dmg    (build on macOS)
#   Windows → .exe  (build on Windows or via GitHub Actions)
extraResources:
  - from: app-bundle
    to: app-bundle
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  # icon: resources/icon.ico  # TODO: add custom icon

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Cat Cafe
  license: null

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  # icon: resources/icon.icns  # TODO: add custom icon
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
