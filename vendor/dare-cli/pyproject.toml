[build-system]
requires = []
build-backend = "_local_backend"
backend-path = ["."]

[project]
name = "deterministic-agent-runtime-engine"
version = "0.1.0"
description = "DARE Framework and external CLI runtime"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "anthropic",
    "langchain-openai",
    "langchain-core",
    "httpx>=0.27.0",
    "starlette>=0.37.0",
    "uvicorn>=0.30.0",
    "chromadb>=0.4.0",
]

[project.scripts]
dare = "client.main:cli"
